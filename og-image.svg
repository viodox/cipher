<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060810"/>
      <stop offset="100%" style="stop-color:#0b0e1a"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00e5ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00e5ff;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="glowLeft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00e5ff;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <pattern id="scanlines" x="0" y="0" width="1200" height="4" patternUnits="userSpaceOnUse">
      <rect width="1200" height="2" fill="rgba(0,229,255,0.013)"/>
    </pattern>
    <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(0,229,255,0.04)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid -->
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Scanlines -->
  <rect width="1200" height="630" fill="url(#scanlines)"/>

  <!-- Left glow blob -->
  <ellipse cx="150" cy="315" rx="300" ry="200" fill="rgba(0,229,255,0.06)"/>
  
  <!-- Right subtle glow -->
  <ellipse cx="1050" cy="315" rx="200" ry="150" fill="rgba(0,255,153,0.04)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="1" fill="url(#accentGrad)"/>
  
  <!-- Bottom accent line -->
  <rect x="0" y="629" width="1200" height="1" fill="url(#accentGrad)"/>

  <!-- Corner brackets - top left -->
  <path d="M 48 48 L 48 80 M 48 48 L 80 48" stroke="#00e5ff" stroke-width="2" fill="none" opacity="0.6"/>
  <!-- Corner brackets - top right -->
  <path d="M 1152 48 L 1152 80 M 1152 48 L 1120 48" stroke="#00e5ff" stroke-width="2" fill="none" opacity="0.6"/>
  <!-- Corner brackets - bottom left -->
  <path d="M 48 582 L 48 550 M 48 582 L 80 582" stroke="#00e5ff" stroke-width="2" fill="none" opacity="0.6"/>
  <!-- Corner brackets - bottom right -->
  <path d="M 1152 582 L 1152 550 M 1152 582 L 1120 582" stroke="#00e5ff" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- Lock icon -->
  <g transform="translate(600, 160)">
    <!-- Lock body -->
    <rect x="-36" y="-4" width="72" height="56" rx="6" fill="none" stroke="#00e5ff" stroke-width="2.5" opacity="0.9"/>
    <!-- Lock shackle -->
    <path d="M -20 -4 L -20 -28 Q -20 -48 0 -48 Q 20 -48 20 -28 L 20 -4" fill="none" stroke="#00e5ff" stroke-width="2.5" opacity="0.9"/>
    <!-- Keyhole -->
    <circle cx="0" cy="22" r="8" fill="none" stroke="#00e5ff" stroke-width="2" opacity="0.7"/>
    <rect x="-3" y="22" width="6" height="12" rx="1" fill="#00e5ff" opacity="0.7"/>
  </g>

  <!-- Glow under lock -->
  <ellipse cx="600" cy="230" rx="80" ry="20" fill="rgba(0,229,255,0.15)"/>

  <!-- CIPHER text -->
  <text x="600" y="310" 
    font-family="'Orbitron', 'Courier New', monospace" 
    font-size="96" 
    font-weight="900" 
    fill="#00e5ff" 
    text-anchor="middle" 
    letter-spacing="24"
    filter="url(#glow)"
    opacity="0.95">CIPHER</text>

  <!-- Subtle text glow layer -->
  <text x="600" y="310" 
    font-family="'Orbitron', 'Courier New', monospace" 
    font-size="96" 
    font-weight="900" 
    fill="none"
    stroke="#00e5ff"
    stroke-width="1"
    text-anchor="middle" 
    letter-spacing="24"
    opacity="0.3">CIPHER</text>

  <!-- Divider line -->
  <rect x="400" y="330" width="400" height="1" fill="url(#accentGrad)" opacity="0.5"/>

  <!-- Tagline -->
  <text x="600" y="375" 
    font-family="'Share Tech Mono', 'Courier New', monospace" 
    font-size="18" 
    fill="#6a7a9a" 
    text-anchor="middle" 
    letter-spacing="6">MEME COIN INTELLIGENCE</text>

  <!-- Feature pills -->
  <!-- Pill 1 -->
  <rect x="195" y="420" width="190" height="36" rx="4" fill="rgba(0,229,255,0.05)" stroke="rgba(0,229,255,0.2)" stroke-width="1"/>
  <text x="290" y="443" font-family="'Courier New', monospace" font-size="12" fill="#00e5ff" text-anchor="middle" letter-spacing="2">150+ COINS LIVE</text>

  <!-- Pill 2 -->
  <rect x="405" y="420" width="190" height="36" rx="4" fill="rgba(0,255,153,0.05)" stroke="rgba(0,255,153,0.2)" stroke-width="1"/>
  <text x="500" y="443" font-family="'Courier New', monospace" font-size="12" fill="#00ff99" text-anchor="middle" letter-spacing="2">AI DECRYPT</text>

  <!-- Pill 3 -->
  <rect x="615" y="420" width="190" height="36" rx="4" fill="rgba(255,51,85,0.05)" stroke="rgba(255,51,85,0.2)" stroke-width="1"/>
  <text x="710" y="443" font-family="'Courier New', monospace" font-size="12" fill="#ff6680" text-anchor="middle" letter-spacing="2">RUG RADAR</text>

  <!-- Pill 4 -->
  <rect x="825" y="420" width="190" height="36" rx="4" fill="rgba(0,229,255,0.05)" stroke="rgba(0,229,255,0.2)" stroke-width="1"/>
  <text x="920" y="443" font-family="'Courier New', monospace" font-size="12" fill="#00e5ff" text-anchor="middle" letter-spacing="2">100% FREE</text>

  <!-- URL -->
  <text x="600" y="530" 
    font-family="'Courier New', monospace" 
    font-size="16" 
    fill="#2a3a5a" 
    text-anchor="middle" 
    letter-spacing="4">WWW.CIPHERSIGNAL.XYZ</text>

  <!-- Status indicator -->
  <circle cx="490" cy="525" r="4" fill="#00ff99" opacity="0.8"/>
  <text x="504" y="530" font-family="'Courier New', monospace" font-size="11" fill="#00ff99" letter-spacing="2" opacity="0.7">LIVE</text>
</svg>
