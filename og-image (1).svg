<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#04060f"/>
      <stop offset="100%" stop-color="#080c18"/>
    </linearGradient>
    <linearGradient id="hline" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00e5ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textglow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#00e5ff" stroke-width="0.3" stroke-opacity="0.07"/>
    </pattern>
    <radialGradient id="cg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#cg)"/>

  <!-- Corner brackets -->
  <path d="M 44 44 L 44 84 M 44 44 L 84 44" stroke="#00e5ff" stroke-width="1.5" fill="none" stroke-opacity="0.5"/>
  <path d="M 1156 44 L 1156 84 M 1156 44 L 1116 44" stroke="#00e5ff" stroke-width="1.5" fill="none" stroke-opacity="0.5"/>
  <path d="M 44 586 L 44 546 M 44 586 L 84 586" stroke="#00e5ff" stroke-width="1.5" fill="none" stroke-opacity="0.5"/>
  <path d="M 1156 586 L 1156 546 M 1156 586 L 1116 586" stroke="#00e5ff" stroke-width="1.5" fill="none" stroke-opacity="0.5"/>

  <!-- Border lines -->
  <rect x="0" y="0" width="1200" height="1" fill="url(#hline)"/>
  <rect x="0" y="629" width="1200" height="1" fill="url(#hline)"/>

  <!-- Lock icon -->
  <g transform="translate(600, 188)" filter="url(#glow)">
    <path d="M -22 2 L -22 -20 Q -22 -38 0 -38 Q 22 -38 22 -20 L 22 2" fill="none" stroke="#00e5ff" stroke-width="3" stroke-linecap="round" stroke-opacity="0.9"/>
    <rect x="-30" y="2" width="60" height="46" rx="5" fill="none" stroke="#00e5ff" stroke-width="3" stroke-opacity="0.9"/>
    <circle cx="0" cy="24" r="7" fill="none" stroke="#00e5ff" stroke-width="2" stroke-opacity="0.7"/>
    <line x1="0" y1="30" x2="0" y2="40" stroke="#00e5ff" stroke-width="2.5" stroke-opacity="0.7" stroke-linecap="round"/>
  </g>

  <!-- CIPHER text -->
  <text x="600" y="318" font-family="'Courier New', Courier, monospace" font-size="110" font-weight="700" fill="#00e5ff" text-anchor="middle" letter-spacing="18" filter="url(#textglow)" opacity="0.95">CIPHER</text>

  <!-- Divider -->
  <rect x="340" y="336" width="520" height="1" fill="url(#hline)" opacity="0.6"/>

  <!-- Tagline -->
  <text x="600" y="376" font-family="'Courier New', Courier, monospace" font-size="15" fill="#4a6080" text-anchor="middle" letter-spacing="8">MEME COIN INTELLIGENCE</text>

  <!-- Pills -->
  <rect x="170" y="418" width="178" height="34" rx="3" fill="#00e5ff" fill-opacity="0.05" stroke="#00e5ff" stroke-opacity="0.25" stroke-width="1"/>
  <text x="259" y="440" font-family="'Courier New', Courier, monospace" font-size="11" fill="#00e5ff" fill-opacity="0.9" text-anchor="middle" letter-spacing="1.5">150+ COINS LIVE</text>

  <rect x="364" y="418" width="148" height="34" rx="3" fill="#00ff99" fill-opacity="0.05" stroke="#00ff99" stroke-opacity="0.25" stroke-width="1"/>
  <text x="438" y="440" font-family="'Courier New', Courier, monospace" font-size="11" fill="#00ff99" fill-opacity="0.9" text-anchor="middle" letter-spacing="1.5">AI DECRYPT</text>

  <rect x="528" y="418" width="144" height="34" rx="3" fill="#ff3355" fill-opacity="0.05" stroke="#ff3355" stroke-opacity="0.25" stroke-width="1"/>
  <text x="600" y="440" font-family="'Courier New', Courier, monospace" font-size="11" fill="#ff6680" fill-opacity="0.9" text-anchor="middle" letter-spacing="1.5">RUG RADAR</text>

  <rect x="688" y="418" width="138" height="34" rx="3" fill="#00e5ff" fill-opacity="0.05" stroke="#00e5ff" stroke-opacity="0.25" stroke-width="1"/>
  <text x="757" y="440" font-family="'Courier New', Courier, monospace" font-size="11" fill="#00e5ff" fill-opacity="0.9" text-anchor="middle" letter-spacing="1.5">100% FREE</text>

  <rect x="842" y="418" width="188" height="34" rx="3" fill="#ffb400" fill-opacity="0.05" stroke="#ffb400" stroke-opacity="0.25" stroke-width="1"/>
  <text x="936" y="440" font-family="'Courier New', Courier, monospace" font-size="11" fill="#ffb400" fill-opacity="0.9" text-anchor="middle" letter-spacing="1.5">DAILY DROP</text>

  <!-- URL -->
  <text x="600" y="536" font-family="'Courier New', Courier, monospace" font-size="13" fill="#1e3050" text-anchor="middle" letter-spacing="5">WWW.CIPHERSIGNAL.XYZ</text>

  <!-- LIVE indicator -->
  <circle cx="557" cy="564" r="3" fill="#00ff99" opacity="0.7"/>
  <text x="567" y="569" font-family="'Courier New', Courier, monospace" font-size="10" fill="#00ff99" fill-opacity="0.6" letter-spacing="2">LIVE</text>
</svg>
