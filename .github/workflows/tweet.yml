name: Daily CIPHER Tweet
on:
  schedule:
    - cron: '0 12 * * *'   # 7am EST — Early morning signal
    - cron: '0 14 * * *'   # 9am EST — Morning movers
    - cron: '0 16 * * *'   # 11am EST — Midday update
    - cron: '0 18 * * *'   # 1pm EST — Afternoon spotlight
    - cron: '0 20 * * *'   # 3pm EST — Afternoon movers
    - cron: '0 22 * * *'   # 5pm EST — Evening signal
    - cron: '0 0 * * *'    # 7pm EST — Night recap
    - cron: '0 2 * * *'    # 9pm EST — Late night degen hour
  workflow_dispatch:

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Post daily tweet
        run: node bot.js
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
